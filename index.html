<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Expensa</title>
    <link rel="stylesheet" href="style.css">
    <script>
    const COLORS = [
        "rgb(0, 255, 163)",
        "rgb(0, 229, 255)",
        "rgb(64, 156, 255)",
        "rgb(120, 80, 255)",
        "rgb(200, 80, 255)",
        "rgb(255, 80, 200)",
        "rgb(255, 80, 100)",
        "rgb(255, 140, 50)",
        "rgb(255, 220, 50)",
        "rgb(100, 255, 130)",
    ];

    function shuffle(arr) {
        return [...arr].sort(() => Math.random() - 0.5);
    }

    function animateColourfulText(el, newColors, duration, staggerDelay) {
        const chars = el.querySelectorAll("span");
        chars.forEach((char, i) => {
            const fromColor = char.style.color || newColors[i % newColors.length];
            const toColor = newColors[i % newColors.length];
            const delay = i * staggerDelay * 1000;
            const ms = duration * 1000;

            // Animate color from current to new
            char.animate(
                [{ color: fromColor }, { color: toColor }],
                { duration: ms, delay, fill: "forwards", easing: "ease" }
            ).onfinish = () => { char.style.color = toColor; };

            // Animate y, scale, blur, opacity as a cycle
            char.animate(
                [
                    { transform: "translateY(0px) scale(1)",     filter: "blur(0px)", opacity: 1   },
                    { transform: "translateY(-3px) scale(1.01)", filter: "blur(5px)", opacity: 0.8 },
                    { transform: "translateY(0px) scale(1)",     filter: "blur(0px)", opacity: 1   },
                ],
                { duration: ms, delay, easing: "ease" }
            );
        });
    }

    function initColourfulText(el, interval = 5000, duration = 0.5, staggerDelay = 0.05) {
        const text = el.textContent;
        el.innerHTML = text.split("").map(c => `<span>${c}</span>`).join("");

        let colors = shuffle(COLORS);
        animateColourfulText(el, colors, duration, staggerDelay);

        setInterval(() => {
            colors = shuffle(COLORS);
            animateColourfulText(el, colors, duration, staggerDelay);
        }, interval);
    }

    document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll(".colourful-text").forEach(el => initColourfulText(el));
    });
    </script>
</head>
<body>
    <header class="site-header">
        <a href="/">Expensa</a>
    </header>

    <main class="content" style="text-align: center; padding-top: 120px;">
        <h1 style="font-size: 56px; font-weight: 500; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 16px;">
            Spend with intention.<br>
            Save with<br class="mobile-break"> <span class="colourful-text">clarity</span>.
        </h1>
        <p style="font-size: 18px; color: #888888;">
            Coming soon.
        </p>
    </main>

    <footer class="site-footer">
        <a href="/privacy.html">Privacy Policy</a>
        <a href="/terms.html">Terms of Use</a>
    </footer>
</body>
</html>
